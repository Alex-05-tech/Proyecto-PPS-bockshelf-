name: Bookshelf CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Tests del Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: bookshelf
          MYSQL_USER: bookshelf_user
          MYSQL_PASSWORD: bookshelf_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install -r bookshelf_v3/backend/requirements.txt && pip install pytest requests

      - name: 🗄️ Inicializar base de datos
        run: mysql -h 127.0.0.1 -P 3306 -u root -prootpassword < bookshelf_v3/backend/bookshelf.sql

      - name: 🚀 Arrancar backend
        run: |
          cd bookshelf_v3/backend
          DB_HOST=127.0.0.1 DB_USER=bookshelf_user DB_PASSWORD=bookshelf_pass DB_NAME=bookshelf python app.py &
          sleep 5

      - name: ✅ Comprobar health
        run: curl --fail http://localhost:5000/api/health && echo "Backend OK ✓"


  # ─────────────────────────────────────────────
  # JOB 2 — Tests del Frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: 🧪 Tests Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install -r bookshelf_v3/frontend/requirements.txt

      - name: 🔍 Comprobar sintaxis Python
        run: python -m py_compile bookshelf_v3/frontend/app.py && echo "Sintaxis OK ✓"


  # ─────────────────────────────────────────────
  # JOB 3 — Build Docker
  # ─────────────────────────────────────────────
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐳 Levantar contenedores
        run: |
          cd bookshelf_v3
          docker compose up -d --build
          sleep 20

      - name: ✅ Comprobar contenedores
        run: |
          cd bookshelf_v3
          docker compose ps | grep "bookshelf_db"       | grep -q "healthy\|Up" && echo "DB OK ✓"       || exit 1
          docker compose ps | grep "bookshelf_backend"  | grep -q "healthy\|Up" && echo "Backend OK ✓"  || exit 1
          docker compose ps | grep "bookshelf_frontend" | grep -q "Up"          && echo "Frontend OK ✓" || exit 1

      - name: 🌐 Comprobar endpoints
        run: |
          curl --fail --retry 5 --retry-delay 3 http://localhost:5000/api/health
          curl --fail --retry 5 --retry-delay 3 http://localhost:8000
          echo "Todos los endpoints responden ✓"

      - name: 🧹 Limpiar
        if: always()
        run: cd bookshelf_v3 && docker compose down -v
